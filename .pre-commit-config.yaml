repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: "ruff: format"
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
        exclude: "^\\.claude/"

      - id: ruff-check
        name: "ruff: lint"
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
        exclude: "^\\.claude/"

      - id: pytest
        name: pytest
        entry: uv run pytest --tb=short -q
        language: system
        pass_filenames: false
        always_run: false
        types: [python]
