# Mock MCP responses for E2E tests.
# Each key is a tool name, value is the deterministic response.

list_analysis_designs:
  - id: DES-A
    hypothesis: "Sales volume correlates with time slot distribution"
    intent: exploratory
    methodology: "Correlation analysis between sales_raw and time_slot"
    source_ids:
      - sales_raw
    metrics:
      - name: correlation_coefficient
        target: "> 0.5"
    acceptance_criteria:
      - condition: "correlation > 0.5"
        action: supports
    status: analyzing
    next_action:
      type: batch_execute
    created_at: "2026-04-15T10:00:00+09:00"
    updated_at: "2026-04-18T15:00:00+09:00"
  - id: DES-B
    hypothesis: "User retention improves with feature engagement score"
    intent: confirmatory
    methodology: "Regression analysis on users_raw engagement metrics"
    source_ids:
      - users_raw
    metrics:
      - name: r_squared
        target: "> 0.6"
    acceptance_criteria:
      - condition: "r_squared > 0.6"
        action: supports
    status: analyzing
    next_action:
      type: batch_execute
    created_at: "2026-04-14T09:00:00+09:00"
    updated_at: "2026-04-17T12:00:00+09:00"
  - id: DES-C
    hypothesis: "Large-scale transaction patterns reveal seasonal anomalies"
    intent: exploratory
    methodology: "Time series decomposition on large_table transactions"
    source_ids:
      - large_table
    metrics:
      - name: anomaly_count
        target: "> 10"
    acceptance_criteria:
      - condition: "anomaly_count > 10"
        action: supports
    status: analyzing
    next_action:
      type: batch_execute
    created_at: "2026-04-16T11:00:00+09:00"
    updated_at: "2026-04-19T08:00:00+09:00"

